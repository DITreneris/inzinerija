<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 540 280" xmlns="http://www.w3.org/2000/svg" aria-labelledby="schema4-title" role="img">
  <title id="schema4-title">Schema 4: multimodalinė įvestis ir atmintis. Multimodalinė įvestis → DI modelis → Multimodalinė išvestis; įrankiai, generavimas, atmintis, informacijos gavimas, saugykla</title>
  <defs>
    <linearGradient id="s4-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="s4-step" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#486581"/>
      <stop offset="100%" stop-color="#334e68"/>
    </linearGradient>
    <marker id="s4-arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#334e68" stroke="#334e68" stroke-width="0.3"/>
    </marker>
  </defs>
  <g transform="translate(10, 10)">
  <rect width="520" height="260" fill="url(#s4-bg)" rx="8"/>
  <rect width="520" height="260" fill="none" stroke="#bcccdc" stroke-width="1" rx="8"/>
  <text x="260" y="24" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="13" font-weight="700" fill="#102a43">Schema 4: multimodalinė įvestis ir atmintis</text>
  <!-- Main: Multi-Modal Input → LLM → Multi-Modal Output -->
  <rect x="12" y="48" width="100" height="48" rx="8" fill="url(#s4-step)" stroke="#334e68" stroke-width="1"/>
  <text x="62" y="68" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="700" fill="white">Multimodalinė</text>
  <text x="62" y="82" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">įvestis (tekstas, vaizdas)</text>
  <line x1="112" y1="72" x2="158" y2="72" stroke="#334e68" stroke-width="1.5" marker-end="url(#s4-arrow)"/>
  <rect x="158" y="48" width="80" height="48" rx="8" fill="url(#s4-step)" stroke="#334e68" stroke-width="1"/>
  <text x="198" y="77" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="12" font-weight="700" fill="white">DI modelis</text>
  <line x1="238" y1="72" x2="284" y2="72" stroke="#334e68" stroke-width="1.5" marker-end="url(#s4-arrow)"/>
  <rect x="284" y="48" width="100" height="48" rx="8" fill="url(#s4-step)" stroke="#334e68" stroke-width="1"/>
  <text x="334" y="68" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="700" fill="white">Multimodalinė</text>
  <text x="334" y="82" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)">išvestis</text>
  <!-- Branch 1: DI modelis → Įrankiai → Generavimas -->
  <line x1="198" y1="96" x2="198" y2="110" stroke="#334e68" stroke-width="1.5" marker-end="url(#s4-arrow)"/>
  <text x="198" y="104" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="#334e68">Įrankiai</text>
  <rect x="158" y="118" width="80" height="36" rx="6" fill="#486581" fill-opacity="0.9" stroke="#334e68" stroke-width="1"/>
  <text x="198" y="138" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="white">Generavimas</text>
  <!-- Branch 2: DI modelis → Atmintis → Informacijos gavimas → Saugykla (modelis naudoja atmintį, ne išvestis) -->
  <path d="M 198 96 L 198 136 L 274 136" fill="none" stroke="#334e68" stroke-width="1.5" marker-end="url(#s4-arrow)"/>
  <rect x="274" y="118" width="120" height="36" rx="6" fill="#b8860b" fill-opacity="0.95" stroke="#7a5807" stroke-width="1"/>
  <text x="334" y="138" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="white">Atmintis</text>
  <line x1="334" y1="154" x2="334" y2="172" stroke="#334e68" stroke-width="1.5" marker-end="url(#s4-arrow)"/>
  <rect x="274" y="172" width="120" height="36" rx="6" fill="#486581" fill-opacity="0.9" stroke="#334e68" stroke-width="1"/>
  <text x="334" y="192" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="9" font-weight="600" fill="white">Informacijos gavimas</text>
  <line x1="334" y1="208" x2="334" y2="218" stroke="#334e68" stroke-width="1.5" marker-end="url(#s4-arrow)"/>
  <rect x="284" y="226" width="100" height="28" rx="6" fill="#64748b" stroke="#475569" stroke-width="1"/>
  <text x="334" y="244" text-anchor="middle" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="600" fill="white">Saugykla</text>
  </g>
</svg>
