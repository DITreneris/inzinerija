name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate schema
        run: npm run validate:schema

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build default production bundle
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: '/inzinerija/'

      - name: Build core production profile
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MVP_MODE: '1'
          VITE_BASE_PATH: '/inzinerija/'

  build-and-deploy:
    needs: quality-gates
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (core production profile – moduliai 1–6)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_MVP_MODE: '1'
          VITE_BASE_PATH: '/inzinerija/'

      # Reikia: Repo Settings → Pages → Source = "GitHub Actions". Žr. docs/deployment/PRE_DEPLOY_INZINERIJA.md §2.1
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
